<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: url('Love-img.jpeg') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      height: 100vh;
      overflow: hidden;
      padding-right: 60px;
    }

    /* overlay */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      top: 0;
      left: 0;
      z-index: 1;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      text-align: center;
      position: relative;
      z-index: 2;
      color: white;
    }

    h1 {
      font-size: 26px;
    }

    p {
      font-size: 14px;
      line-height: 1.6;
    }

    button {
      margin-top: 12px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
    }

    #countdown {
      margin-top: 10px;
      font-size: 14px;
    }

    /* mobile */
    @media (max-width: 768px) {
      body {
        justify-content: center;
        padding: 20px;
      }

      .card {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Happy Birthday Bujjiii ❤️</h1>

    <p>
      This birthday is extra special for you, because for the first time, you’re celebrating it with wishes from your wife 😉💕
    </p>

    <p>
      I miss you and i can't wait to finally see us together,and holding that moment forever 💫
    </p>

    <button onclick="revealMessage()">Open Surprise 🎁</button>

    <p id="hiddenMessage" style="display:none;">
      I LOVE YOU Bujji 💖
    </p>

    <div id="countdown"></div>

    <button onclick="playMusic()">Play Music 🎶</button>
  </div>

  <!-- ✅ YOUR AUDIO FILE -->
  <audio id="bgMusic" loop>
    <source src="Love-Audio.mp4" type="audio/mpeg">
  </audio>

  <script>
    function revealMessage() {
      document.getElementById("hiddenMessage").style.display = "block";
    }

   function playMusic() {
  const music = document.getElementById("bgMusic");
  music.play().catch(() => {
    alert("Tap again to play music 🎶");
  });
}
    const today = new Date();
    const meetDate = new Date(today.getFullYear(), 7, 1).getTime();

    setInterval(() => {
      const now = new Date().getTime();
      const diff = meetDate - now;

      if (diff < 0) {
        document.getElementById("countdown").innerHTML =
          "Finally August ❤️";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));

      document.getElementById("countdown").innerHTML =
        "Counting days to August 1 ❤️: " + days + "d " + hours + "h";
    }, 1000);
  </script>

</body>
</html>
