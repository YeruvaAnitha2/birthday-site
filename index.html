<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: url('Lovely.jpeg') no-repeat center center;
      background-size: contain;
      background-color: black;
      height: 100vh;
      overflow: hidden;
    }

    /* Tap screen */
    #startScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      z-index: 10;
      cursor: pointer;
    }

    .mainContent {
      display: none;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 60px;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 1;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      position: relative;
      z-index: 2;
      color: white;
    }

    button {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #ff4d6d;
      color: white;
      width: 100%;
      cursor: pointer;
    }

    /* 💌 Envelope */
    .envelope {
      width: 200px;
      height: 120px;
      background: #ff4d6d;
      margin: 20px auto;
      position: relative;
      cursor: pointer;
      border-radius: 5px;
    }

    .flap {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #ff758c;
      clip-path: polygon(0 0, 100% 0, 50% 60%);
      transform-origin: top;
      transition: transform 1s;
    }

    .letter {
      position: absolute;
      width: 90%;
      height: 80%;
      background: white;
      top: 10%;
      left: 5%;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
      font-size: 14px;
      opacity: 0;
      transition: 1s;
    }

    .open .flap {
      transform: rotateX(180deg);
    }

    .open .letter {
      opacity: 1;
      transform: translateY(-20px);
    }

    /* 🎉 Confetti */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background: red;
      top: 0;
      animation: fall 3s linear forwards;
      z-index: 999;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      .mainContent {
        justify-content: center;
        align-items: flex-end;
        padding: 20px;
      }

      body {
        background-size: cover;
      }

      .card {
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Tap to start -->
  <div id="startScreen" onclick="startExperience()">
    Tap to start ❤️
  </div>

  <div class="mainContent" id="mainContent">
    <div class="card">
      <h1>Happy Birthday Bujjiii ❤️</h1>

      <p>
        This birthday is extra special for you, because for the first time, you’re celebrating it with wishes from your wife 😉💕
      </p>

      <p>
        I miss you and I can't wait to finally see us together 💫
      </p>

      <!-- 💌 Envelope -->
      <div class="envelope" onclick="openEnvelope(this)">
        <div class="flap"></div>
        <div class="letter">I LOVE YOU Bujji 💖</div>
      </div>

      <div id="countdown"></div>
    </div>
  </div>

  <!-- 🎶 Audio -->
  <audio id="bgMusic" loop>
    <source src="Love-Audio.mp4" type="audio/mp4">
  </audio>

  <script>
    function startExperience() {
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("mainContent").style.display = "flex";

      document.getElementById("bgMusic").play().catch(() => {});
    }

    function openEnvelope(el) {
      el.classList.add("open");
      launchConfetti();
    }

    function launchConfetti() {
      for (let i = 0; i < 40; i++) {
        const conf = document.createElement("div");
        conf.className = "confetti";
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.background = ["#ff4d6d","#ffd700","#00f","#0f0"][Math.floor(Math.random()*4)];
        document.body.appendChild(conf);

        setTimeout(() => conf.remove(), 3000);
      }
    }

    const today = new Date();
    const meetDate = new Date(today.getFullYear(), 7, 1).getTime();

    setInterval(() => {
      const now = new Date().getTime();
      const diff = meetDate - now;

      if (diff < 0) {
        document.getElementById("countdown").innerHTML =
          "Finally August ❤️";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));

      document.getElementById("countdown").innerHTML =
        "Counting days to August 1 ❤️: " + days + "d " + hours + "h";
    }, 1000);
  </script>

</body>
</html>
