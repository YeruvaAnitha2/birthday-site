<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: url('Lovely.jpeg') no-repeat center center;
      background-size: contain;
      background-color: black;
      height: 100vh;
      overflow: hidden;
    }

    /* 🔥 Tap screen */
    #startScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      z-index: 10;
      cursor: pointer;
    }

    .mainContent {
      display: none;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 60px;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      top: 0;
      left: 0;
      z-index: 1;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      text-align: center;
      position: relative;
      z-index: 2;
      color: white;
      animation: fadeIn 1.5s ease-in-out;
    }

    button {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #ff4d6d;
      color: white;
      width: 100%;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .mainContent {
        justify-content: center;
        align-items: flex-end;
        padding: 20px;
      }

      body {
        background-size: cover;
      }

      .card {
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- 🔥 Tap to start -->
  <div id="startScreen" onclick="startExperience()">
    Tap to start ❤️
  </div>

  <!-- 🎉 Main Content -->
  <div class="mainContent" id="mainContent">
    <div class="card">
      <h1>Happy Birthday Bujjiii ❤️</h1>

      <p>
        This birthday is extra special for you, because for the first time, you’re celebrating it with wishes from your wife 😉💕
      </p>

      <p>
        I miss you and I can't wait to finally see us together, and hold that moment forever 💫
      </p>

      <button onclick="revealMessage()">Open Surprise 🎁</button>

      <p id="hiddenMessage" style="display:none;">
        I LOVE YOU Bujji 💖
      </p>

      <div id="countdown"></div>
    </div>
  </div>

  <!-- 🎶 Audio -->
  <audio id="bgMusic" loop>
    <source src="Love-Audio.mp4" type="audio/mp4">
  </audio>

  <script>
    function startExperience() {
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("mainContent").style.display = "flex";

      const music = document.getElementById("bgMusic");
      music.play().catch(() => {});
    }

    function revealMessage() {
      document.getElementById("hiddenMessage").style.display = "block";
    }

    const today = new Date();
    const meetDate = new Date(today.getFullYear(), 7, 1).getTime();

    setInterval(() => {
      const now = new Date().getTime();
      const diff = meetDate - now;

      if (diff < 0) {
        document.getElementById("countdown").innerHTML =
          "Finally August ❤️";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));

      document.getElementById("countdown").innerHTML =
        "Counting days to August 1 ❤️: " + days + "d " + hours + "h";
    }, 1000);
  </script>

</body>
</html>
