<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: url('Lovely.jpeg') no-repeat center center;
      background-size: contain;
      background-color: black;
      height: 100vh;
      overflow: hidden;
    }

    /* Tap screen */
    #startScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      z-index: 10;
      cursor: pointer;
    }

    /* Quiz screen */
    #quizScreen {
      display: none;
      color: white;
      text-align: center;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #options button {
      margin: 10px;
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    .mainContent {
      display: none;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 60px;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 1;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      position: relative;
      z-index: 2;
      color: white;
    }

    button {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #ff4d6d;
      color: white;
      width: 100%;
      cursor: pointer;
    }

    #countdown {
      margin-top: 10px;
    }

    /* Confetti */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      top: 0;
      animation: fall 3s linear forwards;
      z-index: 999;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* Mobile */
    @media (max-width: 768px) {
      .mainContent {
        justify-content: center;
        align-items: flex-end;
        padding: 20px;
      }

      body {
        background-size: cover;
      }

      .card {
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Tap Screen -->
  <div id="startScreen" onclick="startExperience()">
    Tap to unwrap your surprise 🎁❤️
  </div>

  <!-- Quiz -->
  <div id="quizScreen">
    <h2 id="question"></h2>
    <div id="options"></div>
  </div>

  <!-- Main Content -->
  <div class="mainContent" id="mainContent">
    <div class="card">
      <h1>Happy Birthday Bujjiii ❤️</h1>

      <p>
        This birthday is extra special for you, because for the first time, you’re celebrating it with wishes from your wife 😉💕
      </p>

      <p>
        I miss you and I can't wait to finally see us together, and hold that moment forever 💫
      </p>

      <button onclick="revealMessage()">Open Surprise 💌</button>

      <p id="hiddenMessage" style="display:none;">
        I LOVE YOU Bujji 💖
      </p>

      <div id="countdown"></div>
    </div>
  </div>

  <!-- Audio -->
  <audio id="bgMusic" loop>
    <source src="Love-Audio.mp4" type="audio/mp4">
  </audio>

  <script>
    function startExperience() {
      launchConfetti();
      document.getElementById("startScreen").style.display = "none";
      showQuestion();
    }

    const questions = [
      {
        q: "Do you love me? 😏",
        options: ["Yes 😍", "No 🙄"],
        answer: "Yes 😍"
      },
      {
        q: "Do you miss me? 💕",
        options: ["Of course 😘", "Not really 😅"],
        answer: "Of course 😘"
      },
      {
        q: "Am I your favorite person? 😉",
        options: ["Always ❤️", "Maybe 🤔"],
        answer: "Always ❤️"
      }
    ];

    let currentQ = 0;

    function showQuestion() {
      document.getElementById("quizScreen").style.display = "flex";

      const q = questions[currentQ];
      document.getElementById("question").innerText = q.q;

      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      q.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt);
        optionsDiv.appendChild(btn);
      });
    }

    function checkAnswer(selected) {
      if (selected === questions[currentQ].answer) {
        currentQ++;

        if (currentQ < questions.length) {
          showQuestion();
        } else {
          document.getElementById("quizScreen").style.display = "none";
          document.getElementById("mainContent").style.display = "flex";
          document.getElementById("bgMusic").play().catch(() => {});
        }
      } else {
        alert("Hmm… think again mister 😏💕");
      }
    }

    function revealMessage() {
      document.getElementById("hiddenMessage").style.display = "block";
    }

    function launchConfetti() {
      for (let i = 0; i < 50; i++) {
        const conf = document.createElement("div");
        conf.className = "confetti";
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.background =
          ["#ff4d6d","#ffd700","#00f","#0f0","#ff69b4"][Math.floor(Math.random()*5)];
        document.body.appendChild(conf);

        setTimeout(() => conf.remove(), 3000);
      }
    }

    // Countdown
    const today = new Date();
    const meetDate = new Date(today.getFullYear(), 7, 1).getTime();

    setInterval(() => {
      const now = new Date().getTime();
      const diff = meetDate - now;

      if (diff < 0) {
        document.getElementById("countdown").innerHTML =
          "Finally August ❤️";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));

      document.getElementById("countdown").innerHTML =
        "Counting days to August 1 ❤️: " + days + "d " + hours + "h";
    }, 1000);
  </script>

</body>
</html>
